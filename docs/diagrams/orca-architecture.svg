<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" font-family="Inter, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111b2e"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2740"/>
      <stop offset="100%" stop-color="#152037"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#4cc9f0"/>
    </marker>
  </defs>

  <rect width="1000" height="560" fill="url(#bg)"/>
  <text x="500" y="40" text-anchor="middle" fill="#e7eefc" font-size="22" font-weight="700">
    Orca Edge v1.0 — Operational Flow
  </text>
  <text x="500" y="64" text-anchor="middle" fill="#8aa0c8" font-size="13">
    IoT · GPS · Camera · Edge Compute · Location Fusion · Secure Dashboard
  </text>

  <!-- Edge Devices -->
  <g>
    <rect x="40" y="110" width="200" height="340" rx="14" fill="url(#card)" stroke="#2a3a5e"/>
    <text x="140" y="140" text-anchor="middle" fill="#4cc9f0" font-weight="700">Edge Devices</text>

    <rect x="60" y="160" width="160" height="60" rx="10" fill="#0f1a2e" stroke="#2a3a5e"/>
    <text x="140" y="195" text-anchor="middle" fill="#e7eefc" font-size="13">IoT Sensors</text>

    <rect x="60" y="230" width="160" height="60" rx="10" fill="#0f1a2e" stroke="#2a3a5e"/>
    <text x="140" y="265" text-anchor="middle" fill="#e7eefc" font-size="13">GPS Modules</text>

    <rect x="60" y="300" width="160" height="60" rx="10" fill="#0f1a2e" stroke="#2a3a5e"/>
    <text x="140" y="335" text-anchor="middle" fill="#e7eefc" font-size="13">Cameras</text>

    <rect x="60" y="370" width="160" height="60" rx="10" fill="#0f1a2e" stroke="#2a3a5e"/>
    <text x="140" y="405" text-anchor="middle" fill="#e7eefc" font-size="13">Raspberry Pi Nodes</text>
  </g>

  <!-- Edge Compute -->
  <g>
    <rect x="310" y="180" width="180" height="200" rx="14" fill="url(#card)" stroke="#2a3a5e"/>
    <text x="400" y="210" text-anchor="middle" fill="#90e0ef" font-weight="700">Edge Compute</text>
    <text x="400" y="240" text-anchor="middle" fill="#e7eefc" font-size="12">AI Preprocess</text>
    <text x="400" y="262" text-anchor="middle" fill="#e7eefc" font-size="12">Sensor Fusion</text>
    <text x="400" y="284" text-anchor="middle" fill="#e7eefc" font-size="12">Video Frames</text>
    <text x="400" y="320" text-anchor="middle" fill="#8aa0c8" font-size="11">Encrypted Channel</text>
    <text x="400" y="340" text-anchor="middle" fill="#8aa0c8" font-size="11">Token Auth · ATP Trust</text>
  </g>

  <!-- Location Fusion -->
  <g>
    <rect x="560" y="120" width="200" height="160" rx="14" fill="url(#card)" stroke="#2a3a5e"/>
    <text x="660" y="150" text-anchor="middle" fill="#ffd166" font-weight="700">Location Fusion</text>
    <text x="660" y="178" text-anchor="middle" fill="#e7eefc" font-size="12">GPS · IP · Area Code</text>
    <text x="660" y="200" text-anchor="middle" fill="#e7eefc" font-size="12">User-Selected Region</text>
    <text x="660" y="226" text-anchor="middle" fill="#8aa0c8" font-size="11">Confidence Scoring</text>
    <text x="660" y="246" text-anchor="middle" fill="#8aa0c8" font-size="11">Unified Coordinate Output</text>
  </g>

  <!-- ATP Ledger -->
  <g>
    <rect x="560" y="310" width="200" height="120" rx="14" fill="url(#card)" stroke="#2a3a5e"/>
    <text x="660" y="340" text-anchor="middle" fill="#ef476f" font-weight="700">ATP Ledger</text>
    <text x="660" y="368" text-anchor="middle" fill="#e7eefc" font-size="12">HMAC Signed Events</text>
    <text x="660" y="390" text-anchor="middle" fill="#e7eefc" font-size="12">Timestamped</text>
    <text x="660" y="412" text-anchor="middle" fill="#e7eefc" font-size="12">Audit-Ready</text>
  </g>

  <!-- Dashboard -->
  <g>
    <rect x="820" y="180" width="140" height="200" rx="14" fill="url(#card)" stroke="#2a3a5e"/>
    <text x="890" y="210" text-anchor="middle" fill="#06d6a0" font-weight="700">Dashboard</text>
    <text x="890" y="238" text-anchor="middle" fill="#e7eefc" font-size="12">2D / 3D Map</text>
    <text x="890" y="260" text-anchor="middle" fill="#e7eefc" font-size="12">Live Camera</text>
    <text x="890" y="282" text-anchor="middle" fill="#e7eefc" font-size="12">Device Pins</text>
    <text x="890" y="320" text-anchor="middle" fill="#8aa0c8" font-size="11">Operator View</text>
    <text x="890" y="340" text-anchor="middle" fill="#8aa0c8" font-size="11">Real-Time</text>
  </g>

  <!-- Arrows -->
  <g stroke="#4cc9f0" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <path d="M240 280 L 310 280"/>
    <path d="M490 240 L 560 200"/>
    <path d="M490 320 L 560 360"/>
    <path d="M760 200 L 820 240"/>
    <path d="M760 370 L 820 330"/>
  </g>

  <text x="500" y="510" text-anchor="middle" fill="#8aa0c8" font-size="12">
    Devices → Edge Compute → Location Fusion + ATP Ledger → Operator Dashboard
  </text>
</svg>
