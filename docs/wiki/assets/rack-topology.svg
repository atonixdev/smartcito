<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-label="Rack topology">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8f3ec"/>
      <stop offset="100%" stop-color="#dfe8ef"/>
    </linearGradient>
    <style>
      .title { font: 700 46px Georgia, serif; fill: #20323e; }
      .label { font: 700 22px Georgia, serif; fill: #20323e; }
      .body { font: 400 17px Georgia, serif; fill: #405564; }
      .rack { fill: #ffffff; stroke: #20323e; stroke-width: 4; rx: 24; }
      .unit { fill: #edf2f6; stroke: #506675; stroke-width: 2; rx: 18; }
      .line { stroke: #20323e; stroke-width: 4; fill: none; }
    </style>
  </defs>
  <rect width="1400" height="820" fill="url(#bg)"/>
  <text x="80" y="90" class="title">Hardware Fleet and Rack Infrastructure</text>
  <text x="80" y="130" class="body">Reference view of rack layout, redundant power, and cooling-aware placement.</text>
  <rect x="150" y="180" width="520" height="540" class="rack"/>
  <text x="190" y="225" class="label">Rack A</text>
  <rect x="190" y="250" width="440" height="70" class="unit"/>
  <text x="215" y="292" class="label">Core Switches and Firewalls</text>
  <rect x="190" y="340" width="440" height="85" class="unit"/>
  <text x="215" y="388" class="label">Controller Nodes</text>
  <rect x="190" y="445" width="440" height="100" class="unit"/>
  <text x="215" y="500" class="label">GPU Compute Nodes</text>
  <rect x="190" y="565" width="440" height="95" class="unit"/>
  <text x="215" y="618" class="label">Storage and UPS Base</text>
  <rect x="800" y="220" width="420" height="120" class="unit"/>
  <text x="830" y="280" class="label">Power Feed A and PDU A</text>
  <rect x="800" y="390" width="420" height="120" class="unit"/>
  <text x="830" y="450" class="label">Power Feed B and PDU B</text>
  <rect x="800" y="560" width="420" height="120" class="unit"/>
  <text x="830" y="620" class="label">Cooling and Thermal Monitoring</text>
  <path d="M670 285 L800 285" class="line"/>
  <path d="M670 450 L800 450" class="line"/>
  <path d="M670 610 L800 610" class="line"/>
</svg>