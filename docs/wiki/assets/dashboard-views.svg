<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-label="Dashboard and operator views">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f9f5ec"/>
      <stop offset="100%" stop-color="#dde9f1"/>
    </linearGradient>
    <style>
      .title { font: 700 46px Georgia, serif; fill: #243b45; }
      .label { font: 700 22px Georgia, serif; fill: #243b45; }
      .body { font: 400 18px Georgia, serif; fill: #526873; }
      .card { fill: #ffffff; stroke: #243b45; stroke-width: 3; rx: 24; }
      .panel { fill: #eef3f5; stroke: #5d7381; stroke-width: 2; rx: 18; }
      .line { stroke: #243b45; stroke-width: 4; fill: none; }
    </style>
  </defs>
  <rect width="1400" height="820" fill="url(#bg)"/>
  <text x="80" y="90" class="title">Dashboards and Operator Views</text>
  <text x="80" y="130" class="body">Operator screens should transform city telemetry into clear decisions, incident response, and fleet awareness.</text>
  <rect x="130" y="210" width="1140" height="480" class="card"/>
  <rect x="180" y="270" width="300" height="150" class="panel"/>
  <text x="225" y="350" class="label">Camera Fleet Panel</text>
  <rect x="550" y="270" width="300" height="150" class="panel"/>
  <text x="600" y="350" class="label">Traffic Summary</text>
  <rect x="920" y="270" width="280" height="150" class="panel"/>
  <text x="960" y="350" class="label">Recent Readings</text>
  <rect x="250" y="480" width="360" height="130" class="panel"/>
  <text x="330" y="550" class="label">Grafana and Monitoring</text>
  <rect x="760" y="480" width="320" height="130" class="panel"/>
  <text x="845" y="550" class="label">Alerts and Actions</text>
  <path d="M480 345 L550 345" class="line"/>
  <path d="M850 345 L920 345" class="line"/>
  <path d="M1030 420 L1030 480" class="line"/>
  <path d="M400 420 L400 480" class="line"/>
</svg>