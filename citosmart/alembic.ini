# ============================================================================
# File: backend/alembic.ini
# Purpose:
#   Alembic configuration for SmartCito database migrations.
#
#   Migrations live under `backend/migrations/`. The DSN is *not* stored
#   here — `migrations/env.py` reads it from the app's `Settings` object
#   so there is exactly one source of truth.
#
# Common commands (run from `backend/`):
#   alembic revision --autogenerate -m "add some_table"
#   alembic upgrade head
#   alembic downgrade -1
# ============================================================================

[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os
timezone = UTC

# The DSN below is a placeholder. The real URL is injected at runtime by
# `migrations/env.py` (see `config.set_main_option("sqlalchemy.url", ...)`).
sqlalchemy.url = driver://user:pass@host/dbname

[post_write_hooks]
# Format generated migrations with Black so diffs stay clean.
hooks = black
black.type = console_scripts
black.entrypoint = black
black.options = -l 100

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
