# permissions for end users to edit orcas.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: clusterrole
    app.kubernetes.io/instance: orca-editor-role
    app.kubernetes.io/component: rbac
    app.kubernetes.io/created-by: orca-operator
    app.kubernetes.io/part-of: orca-operator
    app.kubernetes.io/managed-by: kustomize
  name: orca-editor-role
rules:
- apiGroups:
  - cache.example.com
  resources:
  - orcas
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - cache.example.com
  resources:
  - orcas/status
  verbs:
  - get
