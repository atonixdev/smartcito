# permissions for end users to view orcas.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: clusterrole
    app.kubernetes.io/instance: orca-viewer-role
    app.kubernetes.io/component: rbac
    app.kubernetes.io/created-by: orca-operator
    app.kubernetes.io/part-of: orca-operator
    app.kubernetes.io/managed-by: kustomize
  name: orca-viewer-role
rules:
- apiGroups:
  - cache.example.com
  resources:
  - orcas
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - cache.example.com
  resources:
  - orcas/status
  verbs:
  - get
