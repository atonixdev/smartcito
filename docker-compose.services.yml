x-logging: &stdout-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  api-router:
    image: nginx:1.27-alpine
    container_name: orca-api-router
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ./infra/deploy/nginx/api-router.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/deploy/runtime/api-upstream.conf:/etc/nginx/conf.d/api-upstream.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/__router/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    logging: *stdout-logging

  citosmart-blue:
    build:
      context: ./citosmart
      image: ${CITOSMART_IMAGE:-atonixdev/api-gateway:1.0.0}
    container_name: orca-citosmart-blue
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      memcached-1:
        condition: service_started
      memcached-2:
        condition: service_started
      memcached-3:
        condition: service_started
      kafka:
        condition: service_started
      mqtt:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health/ready')"]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    logging: *stdout-logging

  citosmart-green:
    build:
      context: ./citosmart
      image: ${CITOSMART_IMAGE:-atonixdev/api-gateway:1.0.0}
    container_name: orca-citosmart-green
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      memcached-1:
        condition: service_started
      memcached-2:
        condition: service_started
      memcached-3:
        condition: service_started
      kafka:
        condition: service_started
      mqtt:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health/ready')"]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    logging: *stdout-logging

  event-consumer-raw:
    image: ${CITOSMART_IMAGE:-atonixdev/api-gateway:1.0.0}
    container_name: orca-event-consumer-raw
    env_file: .env
    command: ["python", "-m", "app.workers.event_consumer_runner"]
    environment:
      EVENT_CONSUMER_MODE: raw
    depends_on:
      kafka:
        condition: service_started
    restart: unless-stopped
    logging: *stdout-logging

  event-consumer-clean:
    image: ${CITOSMART_IMAGE:-atonixdev/api-gateway:1.0.0}
    container_name: orca-event-consumer-clean
    env_file: .env
    command: ["python", "-m", "app.workers.event_consumer_runner"]
    environment:
      EVENT_CONSUMER_MODE: clean
    depends_on:
      kafka:
        condition: service_started
    restart: unless-stopped
    logging: *stdout-logging

  event-consumer-alerts:
    image: ${CITOSMART_IMAGE:-atonixdev/api-gateway:1.0.0}
    container_name: orca-event-consumer-alerts
    env_file: .env
    command: ["python", "-m", "app.workers.event_consumer_runner"]
    environment:
      EVENT_CONSUMER_MODE: alerts
    depends_on:
      kafka:
        condition: service_started
    restart: unless-stopped
    logging: *stdout-logging

  ingestion-kafka-producer:
    build:
      context: .
      dockerfile: ingestion/Dockerfile
      image: ${INGESTION_KAFKA_PRODUCER_IMAGE:-atonixdev/ingestion-kafka-producer:1.0.0}
    container_name: orca-ingestion-kafka-producer
    env_file: .env
    command: ["uvicorn", "ingestion.kafka_producer_service:app", "--host", "0.0.0.0", "--port", "8100"]
    ports:
      - "${INGESTION_KAFKA_PRODUCER_PORT:-8100}:8100"
    depends_on:
      - kafka
      - memcached-1
      - memcached-2
      - memcached-3
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8100/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging: *stdout-logging

  ingestion-spark:
    build:
      context: .
      dockerfile: ingestion/Dockerfile.spark
      image: ${INGESTION_SPARK_IMAGE:-atonixdev/ingestion-spark:1.0.0}
    container_name: orca-ingestion-spark
    env_file: .env
    environment:
      SPARK_MASTER_URL: ${SPARK_MASTER_URL:-local[*]}
    depends_on:
      - kafka
      - memcached-1
      - memcached-2
      - memcached-3
    restart: unless-stopped
    logging: *stdout-logging

  camera-service:
    build:
      context: .
      dockerfile: camera_module/Dockerfile
      image: ${CAMERA_IMAGE:-atonixdev/camera-service:1.0.0}
    container_name: orca-camera-service
    env_file: .env
    ports:
      - "${CAMERA_SERVICE_PORT:-8010}:8010"
    restart: unless-stopped
    logging: *stdout-logging

  gps-service:
    build:
      context: .
      dockerfile: gps_module/Dockerfile
      image: ${GPS_IMAGE:-atonixdev/gps-service:1.0.0}
    container_name: orca-gps-service
    env_file: .env
    ports:
      - "${GPS_SERVICE_PORT:-8011}:8011"
    restart: unless-stopped
    logging: *stdout-logging

  ai-service:
    build:
      context: .
      dockerfile: ai/ai_models/Dockerfile
      image: ${AI_IMAGE:-atonixdev/ai-service:1.0.0}
    container_name: orca-ai-service
    env_file: .env
    ports:
      - "${AI_SERVICE_PORT:-8012}:8012"
    depends_on:
      - memcached-1
      - memcached-2
      - memcached-3
    restart: unless-stopped
    logging: *stdout-logging

  security-service:
    build:
      context: .
      dockerfile: security/Dockerfile
      image: ${SECURITY_IMAGE:-atonixdev/security-service:1.0.0}
    container_name: orca-security-service
    env_file: .env
    ports:
      - "${SECURITY_SERVICE_PORT:-8013}:8013"
    depends_on:
      - api-router
    restart: unless-stopped
    logging: *stdout-logging

  hardware-agent:
    build:
      context: .
      dockerfile: hardware/Dockerfile
      image: ${HARDWARE_IMAGE:-atonixdev/hardware-agent:1.0.0}
    container_name: orca-hardware-agent
    env_file: .env
    ports:
      - "${HARDWARE_AGENT_PORT:-8014}:8014"
    restart: unless-stopped
    logging: *stdout-logging

  drone-gateway:
    build:
      context: .
      dockerfile: surveillance/Dockerfile
      image: ${DRONE_GATEWAY_IMAGE:-atonixdev/drone-gateway:1.0.0}
    container_name: orca-drone-gateway
    env_file: .env
    command: ["uvicorn", "surveillance.drone_gateway_service:app", "--host", "0.0.0.0", "--port", "8020"]
    ports:
      - "${DRONE_GATEWAY_PORT:-8020}:8020"
    depends_on:
      - kafka
      - postgres
    restart: unless-stopped
    logging: *stdout-logging

  sensor-gateway:
    build:
      context: .
      dockerfile: surveillance/Dockerfile
      image: ${SENSOR_GATEWAY_IMAGE:-atonixdev/sensor-gateway:1.0.0}
    container_name: orca-sensor-gateway
    env_file: .env
    command: ["uvicorn", "surveillance.sensor_gateway_service:app", "--host", "0.0.0.0", "--port", "8021"]
    ports:
      - "${SENSOR_GATEWAY_PORT:-8021}:8021"
    depends_on:
      - kafka
    restart: unless-stopped
    logging: *stdout-logging

  drone-camera-ingestion:
    build:
      context: .
      dockerfile: surveillance/Dockerfile
      image: ${DRONE_CAMERA_IMAGE:-atonixdev/drone-camera-ingestion:1.0.0}
    container_name: orca-drone-camera-ingestion
    env_file: .env
    command: ["uvicorn", "surveillance.drone_camera_service:app", "--host", "0.0.0.0", "--port", "8022"]
    ports:
      - "${DRONE_CAMERA_PORT:-8022}:8022"
    depends_on:
      - kafka
    restart: unless-stopped
    logging: *stdout-logging

  mission-control:
    build:
      context: .
      dockerfile: surveillance/Dockerfile
      image: ${MISSION_CONTROL_IMAGE:-atonixdev/mission-control:1.0.0}
    container_name: orca-mission-control
    env_file: .env
    command: ["uvicorn", "surveillance.mission_control_service:app", "--host", "0.0.0.0", "--port", "8025"]
    ports:
      - "${MISSION_CONTROL_PORT:-8025}:8025"
    depends_on:
      - kafka
      - drone-gateway
    restart: unless-stopped
    logging: *stdout-logging

  threat-detection:
    build:
      context: .
      dockerfile: surveillance/Dockerfile
      image: ${THREAT_DETECTION_IMAGE:-atonixdev/threat-detection:1.0.0}
    container_name: orca-threat-detection
    env_file: .env
    command: ["uvicorn", "surveillance.threat_detection_service:app", "--host", "0.0.0.0", "--port", "8023"]
    ports:
      - "${THREAT_DETECTION_PORT:-8023}:8023"
    depends_on:
      - kafka
    restart: unless-stopped
    logging: *stdout-logging

  mapping-geospatial:
    build:
      context: .
      dockerfile: surveillance/Dockerfile
      image: ${MAPPING_GEOSPATIAL_IMAGE:-atonixdev/mapping-geospatial:1.0.0}
    container_name: orca-mapping-geospatial
    env_file: .env
    command: ["uvicorn", "surveillance.mapping_service:app", "--host", "0.0.0.0", "--port", "8024"]
    ports:
      - "${MAPPING_GEOSPATIAL_PORT:-8024}:8024"
    depends_on:
      - kafka
    restart: unless-stopped
    logging: *stdout-logging

  postgres:
    image: cgr.dev/chainguard/postgres:latest@sha256:34a4d686aa44583457bbdbdeb662243e7ab29e89e5c9b40df8e33baa6b75dc47
    container_name: orca-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-orca}
      POSTGRES_USER: ${DB_USER:-orca}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-orca}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - ./database/init/001_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-orca}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    logging: *stdout-logging

  redis:
    image: redis:7-alpine
    container_name: orca-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    restart: unless-stopped
    logging: *stdout-logging

  memcached-1:
    image: memcached:1.6-alpine
    container_name: orca-memcached-1
    command: ["memcached", "-m", "256", "-I", "4m", "-o", "modern", "-v"]
    restart: unless-stopped
    logging: *stdout-logging

  memcached-2:
    image: memcached:1.6-alpine
    container_name: orca-memcached-2
    command: ["memcached", "-m", "256", "-I", "4m", "-o", "modern", "-v"]
    restart: unless-stopped
    logging: *stdout-logging

  memcached-3:
    image: memcached:1.6-alpine
    container_name: orca-memcached-3
    command: ["memcached", "-m", "256", "-I", "4m", "-o", "modern", "-v"]
    restart: unless-stopped
    logging: *stdout-logging

  memcached-exporter:
    image: prom/memcached-exporter:v0.15.0
    container_name: orca-memcached-exporter
    command: ["--memcached.address=memcached-1:11211"]
    depends_on:
      - memcached-1
    restart: unless-stopped
    logging: *stdout-logging

  kafka:
    image: bitnami/kafka:3.7
    container_name: orca-kafka
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: "broker,controller"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    restart: unless-stopped
    logging: *stdout-logging

  mqtt:
    image: eclipse-mosquitto:2.0
    container_name: orca-mqtt
    ports:
      - "${MQTT_PORT:-1883}:1883"
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    restart: unless-stopped
    logging: *stdout-logging

  webapp:
    build:
      context: ./webapp
      image: ${WEBAPP_IMAGE:-atonixdev/webapp:1.0.0}
    container_name: orca-webapp
    env_file: .env
    ports:
      - "${WEBAPP_PORT:-5173}:80"
    depends_on:
      - api-router
    restart: unless-stopped
    logging: *stdout-logging

volumes:
  pgdata:
