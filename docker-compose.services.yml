services:
  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    ports:
      - "8000:8000"

  camera-service:
    build:
      context: .
      dockerfile: camera_module/Dockerfile
    ports:
      - "8010:8010"

  gps-service:
    build:
      context: .
      dockerfile: gps_module/Dockerfile
    ports:
      - "8011:8011"

  ai-service:
    build:
      context: .
      dockerfile: ai_models/Dockerfile
    ports:
      - "8012:8012"

  security-service:
    build:
      context: .
      dockerfile: security/Dockerfile
    ports:
      - "8013:8013"
    env_file: .env

  hardware-agent:
    build:
      context: .
      dockerfile: hardware/Dockerfile
    ports:
      - "8014:8014"

  db-service:
    image: cgr.dev/chainguard/postgres:latest@sha256:34a4d686aa44583457bbdbdeb662243e7ab29e89e5c9b40df8e33baa6b75dc47
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smartcito}
      POSTGRES_USER: ${POSTGRES_USER:-smartcito}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartcito}
    ports:
      - "5432:5432"
    volumes:
      - ./database/init/001_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro

  frontend-service:
    build:
      context: ./webapp
    ports:
      - "5173:80"
