name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-backend:
    name: Security checks (backend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: citosmart
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: citosmart/requirements-dev.txt

      - name: Install backend dependencies
        run: pip install -r requirements-dev.txt bandit pip-audit

      - name: Bandit
        run: bandit -r app -x tests

      - name: pip-audit
        run: pip-audit -r requirements.txt

      - name: Security policy tests
        run: pytest ../tests/security -v

  security-webapp:
    name: Security checks (webapp)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webapp
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: webapp/package-lock.json

      - name: Install webapp dependencies
        run: npm install --no-fund

      - name: npm audit (moderate+)
        run: npm audit --audit-level=moderate

  secrets:
    name: Secret scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  containers:
    name: Container scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Trivy scan - backend Dockerfile
        run: trivy config --exit-code 1 --severity HIGH,CRITICAL citosmart/Dockerfile

      - name: Trivy scan - webapp Dockerfile
        run: trivy config --exit-code 1 --severity HIGH,CRITICAL webapp/Dockerfile
