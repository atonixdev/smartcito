name: Security

on:
  push:
    branches:
      - main
      - develop
      - release/**
      - hotfix/**
  pull_request:
    branches:
      - main
      - develop

jobs:
  pr-checklist:
    name: Security checklist sign-off
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR checklist
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request?.body || "";
            const required = [
              /- \[x\] Security checklist reviewed/i,
              /- \[x\] CI passes \(tests, security, containers\)/i,
            ];
            const missing = required.filter((pattern) => !pattern.test(body));
            if (missing.length > 0) {
              core.setFailed("PR template must include checked security sign-off and CI gate confirmation.");
            }

  security-backend:
    name: Security checks (backend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: orcaapi
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: orcaapi/requirements-dev.txt

      - name: Install backend dependencies
        run: pip install -r requirements-dev.txt bandit pip-audit

      - name: Bandit
        run: bandit -r app -x tests -s B104,B110,B112

      - name: pip-audit
        run: pip-audit -r requirements.txt

      - name: Security policy tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest ../tests/security -v

  security-webapp:
    name: Security checks (webapp)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webapp
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: webapp/package-lock.json

      - name: Install webapp dependencies
        run: npm ci --no-fund

      - name: npm audit (moderate+)
        run: npm audit --audit-level=moderate

  secrets:
    name: Secret scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  containers:
    name: Container build and manifest checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Trivy scan - backend Dockerfile
        run: trivy config --exit-code 1 --severity HIGH,CRITICAL orcaapi/Dockerfile

      - name: Trivy scan - webapp Dockerfile
        run: trivy config --exit-code 1 --severity HIGH,CRITICAL webapp/Dockerfile

      - name: Trivy scan - domain Dockerfiles
        run: |
          trivy config --exit-code 1 --severity HIGH,CRITICAL vision/camera_module/Dockerfile
          trivy config --exit-code 1 --severity HIGH,CRITICAL sensors/gps_module/Dockerfile
          trivy config --exit-code 1 --severity HIGH,CRITICAL ai/ai_models/Dockerfile
          trivy config --exit-code 1 --severity HIGH,CRITICAL services/security_domain/Dockerfile
          trivy config --exit-code 1 --severity HIGH,CRITICAL edge/hardware/Dockerfile

      - name: Trivy scan - security configuration
        run: trivy config --exit-code 1 --severity HIGH,CRITICAL services/security_domain

      - name: Install manifest validation dependency
        run: python3 -m pip install --user PyYAML

      - name: Validate Kubernetes manifests
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import yaml

          manifest_dir = Path("infra/kubernetes")
          yaml_files = sorted(manifest_dir.glob("*.yaml"))
          if not yaml_files:
              raise SystemExit("No Kubernetes manifests found in infra/kubernetes")

          for manifest in yaml_files:
              documents = list(yaml.safe_load_all(manifest.read_text()))
              if not documents:
                  raise SystemExit(f"{manifest} is empty")

          print(f"Validated {len(yaml_files)} Kubernetes manifest files")
          PY
