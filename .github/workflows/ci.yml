name: CI

on:
  workflow_call:
  push:
    branches:
      - main
      - develop
      - release/**
      - hotfix/**
  pull_request:
    branches:
      - main
      - develop

jobs:
  memcached-smoke:
    name: Memcached Smoke Check
    runs-on: ubuntu-latest
    services:
      memcached:
        image: memcached:1.6-alpine
        ports:
          - 11211:11211
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install smoke dependencies
        run: pip install pymemcache==4.0.0

      - name: Run Memcached smoke test
        env:
          MEMCACHED_SERVERS: 127.0.0.1:11211
        run: python scripts/ci/memcached_smoke.py

  ai-offline-smoke:
    name: Orca AI Offline Smoke Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run offline AI workflow smoke test
        run: python scripts/ci/ai_offline_validation.py

  orcaapi:
    name: Unit Tests and Quality (orcaapi)
    runs-on: ubuntu-latest
    needs: memcached-smoke
    services:
      memcached:
        image: memcached:1.6-alpine
        ports:
          - 11211:11211
    defaults:
      run:
        working-directory: orcaapi
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: orcaapi/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt black flake8 mypy

      - name: Black
        run: black --check .

      - name: Flake8
        run: flake8 .

      - name: Mypy
        run: mypy app

      - name: Pytest
        env:
          MEMCACHED_SERVERS: memcached:11211
        run: pytest

  python-services:
    name: Unit Tests and Quality (python services)
    runs-on: ubuntu-latest
    needs:
      - memcached-smoke
      - ai-offline-smoke
    services:
      memcached:
        image: memcached:1.6-alpine
        ports:
          - 11211:11211
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install black flake8 mypy pytest httpx
          pip install -r orcaapi/requirements.txt
          pip install -r ai/ai_models/requirements.txt
          pip install -r camera_module/requirements.txt
          pip install -r gps_module/requirements.txt
          pip install -r ingestion/requirements.txt
          pip install -r security/requirements.txt
          pip install -r hardware/requirements.txt

      - name: Black
        run: black --check ai/ai_models camera_module gps_module ingestion security/service.py hardware/service.py ai/ai_models/tests camera_module/tests gps_module/tests ingestion/tests security/tests hardware/tests

      - name: Flake8
        run: flake8 ai/ai_models camera_module gps_module ingestion security/service.py hardware/service.py ai/ai_models/tests camera_module/tests gps_module/tests ingestion/tests security/tests hardware/tests

      - name: Mypy
        run: mypy --ignore-missing-imports ai/ai_models camera_module gps_module ingestion security/service.py hardware/service.py ai/ai_models/tests camera_module/tests gps_module/tests ingestion/tests security/tests hardware/tests

      - name: Pytest
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/orcaapi
          MEMCACHED_SERVERS: memcached:11211
        run: pytest ai/ai_models/tests camera_module/tests gps_module/tests ingestion/tests security/tests hardware/tests

  security-tests:
    name: Security Policy Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install pytest pyyaml

      - name: Run security policy tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest tests/security -v

  webapp:
    name: Unit Tests and Quality (webapp)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webapp
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: webapp/package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Prettier
        run: npm run format:check

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  map:
    name: Unit Tests and Quality (map)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: map
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Prettier
        run: npm run format:check

      - name: Test
        run: npm test
