name: Full Stack CI/CD

on:
  push:
    branches:
      - main
      - develop
      - release/**
      - hotfix/**
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      deploy_production:
        description: Deploy production after packaging
        required: false
        default: false
        type: boolean

env:
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/smartcito
  IMAGE_TAG: ${{ github.sha }}

jobs:
  test-and-quality:
    name: Reuse CI checks
    uses: ./.github/workflows/ci.yml

  package-images:
    name: Package Docker images
    runs-on: ubuntu-latest
    needs: test-and-quality
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: citosmart
            context: ./citosmart
            dockerfile: ./citosmart/Dockerfile
          - image: webapp
            context: ./webapp
            dockerfile: ./webapp/Dockerfile
          - image: camera-service
            context: .
            dockerfile: ./camera_module/Dockerfile
          - image: gps-service
            context: .
            dockerfile: ./gps_module/Dockerfile
          - image: ai-service
            context: .
            dockerfile: ./ai_models/Dockerfile
          - image: security-service
            context: .
            dockerfile: ./security/Dockerfile
          - image: hardware-agent
            context: .
            dockerfile: ./hardware/Dockerfile
          - image: usb-module
            context: .
            dockerfile: ./hardware/usb_module/Dockerfile
          - image: ingestion-kafka-producer
            context: .
            dockerfile: ./ingestion/Dockerfile
          - image: ingestion-spark
            context: .
            dockerfile: ./ingestion/Dockerfile.spark
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and optionally push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.deploy_production) }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:latest

  deploy-staging:
    name: Deploy staging
    runs-on: ubuntu-latest
    needs: package-images
    if: github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Install SSH client
        run: sudo apt-get update && sudo apt-get install -y openssh-client

      - name: Configure SSH key
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Deploy staging stack
        env:
          DEPLOY_ENVIRONMENT: staging
          DEPLOY_HOST: ${{ secrets.STAGING_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.STAGING_DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.STAGING_DEPLOY_PATH }}
          IMAGE_REGISTRY: ${{ env.IMAGE_PREFIX }}
          IMAGE_TAG: ${{ github.sha }}
          APP_ENV: staging
          DEPLOY_STRATEGY: blue-green-api
        run: bash infra/deploy/deploy_remote.sh staging

  deploy-production:
    name: Deploy production
    runs-on: ubuntu-latest
    needs: package-images
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.deploy_production)
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install SSH client
        run: sudo apt-get update && sudo apt-get install -y openssh-client

      - name: Configure SSH key
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Deploy production stack
        env:
          DEPLOY_ENVIRONMENT: production
          DEPLOY_HOST: ${{ secrets.PRODUCTION_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.PRODUCTION_DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.PRODUCTION_DEPLOY_PATH }}
          IMAGE_REGISTRY: ${{ env.IMAGE_PREFIX }}
          IMAGE_TAG: ${{ github.sha }}
          APP_ENV: production
          DEPLOY_STRATEGY: blue-green-api
        run: bash infra/deploy/deploy_remote.sh production