apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-master
  namespace: data-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark-master
  template:
    metadata:
      labels:
        app: spark-master
    spec:
      containers:
        - name: spark-master
          image: bitnami/spark:3.5
          imagePullPolicy: IfNotPresent
          env:
            - name: SPARK_MODE
              value: master
          ports:
            - containerPort: 7077
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: spark-master
  namespace: data-platform
spec:
  selector:
    app: spark-master
  ports:
    - name: spark
      port: 7077
      targetPort: 7077
    - name: web
      port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-worker
  namespace: data-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: spark-worker
  template:
    metadata:
      labels:
        app: spark-worker
    spec:
      containers:
        - name: spark-worker
          image: bitnami/spark:3.5
          imagePullPolicy: IfNotPresent
          env:
            - name: SPARK_MODE
              value: worker
            - name: SPARK_MASTER_URL
              value: spark://spark-master.data-platform.svc.cluster.local:7077
            - name: SPARK_WORKER_MEMORY
              value: 4G
            - name: SPARK_WORKER_CORES
              value: "2"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-streaming
  namespace: data-platform
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: spark-streaming
  template:
    metadata:
      labels:
        app: spark-streaming
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "4040"
    spec:
      containers:
        - name: spark-streaming
          image: atonixdev/ingestion-spark:1.0.0
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: smartcito-platform-config
            - secretRef:
                name: smartcito-platform-secrets
          env:
            - name: SPARK_MASTER_URL
              value: spark://spark-master.data-platform.svc.cluster.local:7077
          command:
            - /opt/bitnami/spark/bin/spark-submit
          args:
            - --master
            - spark://spark-master.data-platform.svc.cluster.local:7077
            - --packages
            - org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.1,org.postgresql:postgresql:42.7.4
            - /opt/smartcito/ingestion/streaming_job.py
          volumeMounts:
            - name: spark-checkpoints
              mountPath: /opt/spark/checkpoints
      volumes:
        - name: spark-checkpoints
          persistentVolumeClaim:
            claimName: spark-checkpoints