apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion-kafka-producer
  namespace: ingestion
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ingestion-kafka-producer
  template:
    metadata:
      labels:
        app: ingestion-kafka-producer
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8100"
    spec:
      containers:
        - name: ingestion-kafka-producer
          image: atonixdev/orca-ingestion-kafka-producer:1.0.0
          imagePullPolicy: IfNotPresent
          command: ["uvicorn", "ingestion.kafka_producer_service:app", "--host", "0.0.0.0", "--port", "8100"]
          envFrom:
            - configMapRef:
                name: orca-platform-config
            - secretRef:
                name: orca-platform-secrets
          ports:
            - containerPort: 8100
          readinessProbe:
            httpGet:
              path: /ready
              port: 8100
          livenessProbe:
            httpGet:
              path: /health
              port: 8100
---
apiVersion: v1
kind: Service
metadata:
  name: ingestion-kafka-producer
  namespace: ingestion
spec:
  selector:
    app: ingestion-kafka-producer
  ports:
    - port: 8100
      targetPort: 8100
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ingestion-kafka-producer
  namespace: ingestion
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ingestion-kafka-producer
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70