apiVersion: apps/v1
kind: Deployment
metadata:
  name: security-service
  namespace: security
spec:
  replicas: 2
  selector:
    matchLabels:
      app: security-service
  template:
    metadata:
      labels:
        app: security-service
    spec:
      containers:
        - name: security-service
          image: atonixdev/security-service:1.0.0
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: smartcito-platform-config
            - secretRef:
                name: smartcito-platform-secrets
          ports:
            - containerPort: 8013
          readinessProbe:
            httpGet:
              path: /health
              port: 8013
          livenessProbe:
            httpGet:
              path: /health
              port: 8013
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: security-service
  namespace: security
spec:
  selector:
    app: security-service
  ports:
    - port: 80
      targetPort: 8013
  type: ClusterIP
