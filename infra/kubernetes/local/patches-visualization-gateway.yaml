apiVersion: v1
kind: Service
metadata:
  name: visualization-gateway
  namespace: visualization
  annotations: {}
spec:
  type: NodePort
  loadBalancerSourceRanges: []
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30081
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: visualization-gateway-config
  namespace: visualization
data:
  default.conf: |
    server {
        listen 80;
        server_name _;

        location /api/ {
            proxy_pass http://citosmart-api.backend.svc.cluster.local:8000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /dash/ {
            proxy_pass http://dash.visualization.svc.cluster.local:8050/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Prefix /dash;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /grafana/ {
            return 404;
        }

        location /kibana/ {
            return 404;
        }

        location / {
            proxy_pass http://frontend-service.visualization.svc.cluster.local:80/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }