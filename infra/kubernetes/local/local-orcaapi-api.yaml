apiVersion: apps/v1
kind: Deployment
metadata:
  name: orcaapi-api
  namespace: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orcaapi-api
  template:
    metadata:
      labels:
        app: orcaapi-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: orcaapi-api
          image: atonixdev/orca-api-gateway:1.0.0
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: orca-platform-config
            - secretRef:
                name: orca-platform-secrets
          env:
            - name: PYTHONPATH
              value: /app
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: orca-data
              mountPath: /app/data
            - name: orca-shared
              mountPath: /app/smartcito_shared
              readOnly: true
            - name: orca-hardware
              mountPath: /app/hardware
              readOnly: true
            - name: ingestion-config
              mountPath: /ingestion/config
              readOnly: true
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: 8000
          livenessProbe:
            httpGet:
              path: /api/v1/health/live
              port: 8000
      volumes:
        - name: orca-data
          hostPath:
            path: /workspace/orca/data
            type: Directory
        - name: orca-shared
          hostPath:
            path: /workspace/orca/orca_shared
            type: Directory
        - name: orca-hardware
          hostPath:
            path: /workspace/orca/hardware
            type: Directory
        - name: ingestion-config
          hostPath:
            path: /workspace/orca/ingestion/config
            type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: orcaapi-api
  namespace: backend
spec:
  selector:
    app: orcaapi-api
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP