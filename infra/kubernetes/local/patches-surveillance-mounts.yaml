apiVersion: apps/v1
kind: Deployment
metadata:
  name: drone-gateway
  namespace: backend
spec:
  template:
    spec:
      containers:
        - name: drone-gateway
          env:
            - name: PYTHONPATH
              value: /app
          volumeMounts:
            - name: smartcito-shared
              mountPath: /app/smartcito_shared
              readOnly: true
      volumes:
        - name: smartcito-shared
          hostPath:
            path: /workspace/smartcito/smartcito_shared
            type: Directory
---
