apiVersion: apps/v1
kind: Deployment
metadata:
  name: dash
  namespace: visualization
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dash
  template:
    metadata:
      labels:
        app: dash
    spec:
      containers:
        - name: dash
          image: atonixdev/orca-dash:1.0.0
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "app.dash_app.server"]
          envFrom:
            - configMapRef:
                name: orca-platform-config
          env:
            - name: PYTHONPATH
              value: /app
            - name: DASH_REFRESH_MS
              value: "5000"
          ports:
            - containerPort: 8050
          volumeMounts:
            - name: orca-shared
              mountPath: /app/smartcito_shared
              readOnly: true
            - name: orca-hardware
              mountPath: /app/hardware
              readOnly: true
          readinessProbe:
            httpGet:
              path: /metrics
              port: 8050
          livenessProbe:
            httpGet:
              path: /metrics
              port: 8050
      volumes:
        - name: orca-shared
          hostPath:
            path: /workspace/orca/orca_shared
            type: Directory
        - name: orca-hardware
          hostPath:
            path: /workspace/orca/hardware
            type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: dash
  namespace: visualization
spec:
  selector:
    app: dash
  ports:
    - port: 8050
      targetPort: 8050
  type: ClusterIP