apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-nginx-config
  namespace: visualization
data:
  default.conf: |
    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        location /api/ {
            proxy_pass http://citosmart-api.backend.svc.cluster.local:8000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /drone-gateway/ {
            proxy_pass http://drone-gateway.backend.svc.cluster.local:8020/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /mission-control/ {
            proxy_pass http://mission-control.backend.svc.cluster.local:8025/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /mapping-geospatial/ {
            proxy_pass http://mapping-geospatial.visualization.svc.cluster.local:8024/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /drone-camera/ {
            proxy_pass http://drone-camera-ingestion.backend.svc.cluster.local:8022/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /threat-detection/ {
            proxy_pass http://threat-detection.ai.svc.cluster.local:8023/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /dash/ {
            proxy_pass http://dash.visualization.svc.cluster.local:8050/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Prefix /dash;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /grafana/ {
            return 404;
        }

        location /kibana/ {
            return 404;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }