apiVersion: apps/v1
kind: Deployment
metadata:
  name: camera-service
  namespace: ingestion
spec:
  replicas: 2
  selector:
    matchLabels:
      app: camera-service
  template:
    metadata:
      labels:
        app: camera-service
    spec:
      containers:
        - name: camera-service
          image: atonixdev/camera-service:1.0.0
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: orca-platform-config
            - secretRef:
                name: orca-platform-secrets
          ports:
            - containerPort: 8010
          readinessProbe:
            httpGet:
              path: /health
              port: 8010
          livenessProbe:
            httpGet:
              path: /health
              port: 8010
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: camera-service
  namespace: ingestion
spec:
  selector:
    app: camera-service
  ports:
    - port: 80
      targetPort: 8010
  type: ClusterIP
