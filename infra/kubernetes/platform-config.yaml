apiVersion: v1
kind: ConfigMap
metadata:
  name: orca-platform-config
  namespace: backend
data:
  APP_ENV: staging
  DB_HOST: postgres.database.svc.cluster.local
  DB_PORT: "5432"
  DB_NAME: orca
  DB_USER: orca
  POSTGRES_PRIMARY_HOST: postgres-primary.database.svc.cluster.local
  POSTGRES_REPLICA_HOST: postgres-replica.database.svc.cluster.local
  HDFS_ENABLED: "true"
  HDFS_NAMENODE_RPC_ADDRESS: hdfs-namenode.database.svc.cluster.local:8020
  HDFS_NAMENODE_HTTP_ADDRESS: hdfs-namenode.database.svc.cluster.local:9870
  HDFS_RAW_DATA_PATH: /orca/raw
  HDFS_ARCHIVE_PATH: /orca/archive
  HDFS_AI_TRAINING_PATH: /orca/ai/training
  HBASE_ENABLED: "true"
  HBASE_ZOOKEEPER_QUORUM: zookeeper.database.svc.cluster.local
  HBASE_ZOOKEEPER_CLIENT_PORT: "2181"
  HBASE_MASTER_ADDRESS: hbase-master.database.svc.cluster.local:16000
  HBASE_THRIFT_ADDRESS: hbase-thrift.database.svc.cluster.local:9090
  HBASE_SENSOR_TABLE: orca_sensor_events
  HBASE_COLUMN_FAMILY: d
  MEMCACHED_SERVERS: memcached-0.memcached-internal.data-platform.svc.cluster.local:11211,memcached-1.memcached-internal.data-platform.svc.cluster.local:11211,memcached-2.memcached-internal.data-platform.svc.cluster.local:11211
  MEMCACHED_DEFAULT_TTL_SECONDS: "60"
  MEMCACHED_API_TTL_SECONDS: "60"
  MEMCACHED_DASHBOARD_TTL_SECONDS: "45"
  MEMCACHED_DEVICE_METADATA_TTL_SECONDS: "300"
  MEMCACHED_AI_TTL_SECONDS: "1800"
  MEMCACHED_SESSION_TTL_SECONDS: "3600"
  KAFKA_BROKER_URL: kafka-bootstrap.data-platform.svc.cluster.local:9092
  MESSAGE_BUS_URL: kafka-bootstrap.data-platform.svc.cluster.local:9092
  KAFKA_GPS_TOPIC: orca.gps.raw
  KAFKA_CCTV_TOPIC: orca.cctv.raw
  KAFKA_IOT_TOPIC: orca.iot.raw
  KAFKA_SENSOR_TOPIC: orca.sensors.raw
  KAFKA_RAW_EVENTS_TOPIC: orca.events.raw
  KAFKA_CLEAN_EVENTS_TOPIC: orca.events.clean
  KAFKA_ALERTS_TOPIC: orca.alerts
  KAFKA_SENSOR_ALERTS_TOPIC: orca.sensor.alerts
  KAFKA_DRONE_TELEMETRY_TOPIC: orca.drone.telemetry
  KAFKA_DRONE_EVENTS_TOPIC: orca.drone.events
  KAFKA_DRONE_MISSIONS_TOPIC: orca.drone.missions
  KAFKA_DRONE_CAMERA_FRAMES_TOPIC: orca.drone.camera.frames
  KAFKA_DRONE_CAMERA_ALERTS_TOPIC: orca.drone.camera.alerts
  KAFKA_THREAT_ALERTS_TOPIC: orca.threat.alerts
  KAFKA_LOCATION_ENRICHED_TOPIC: orca.location.enriched
  OBJECT_STORAGE_ENDPOINT: s3://orca-artifacts
  OBJECT_STORAGE_BUCKET: orca-artifacts
  AI_MODELS_URL: http://ai-service.ai.svc.cluster.local
  SPARK_MASTER_URL: spark://spark-master.data-platform.svc.cluster.local:7077
  SPARK_CHECKPOINT_DIR: /opt/spark/checkpoints/orca
  SPARK_OBJECT_STORAGE_PATH: s3a://orca-artifacts/streaming
  AUTH_ISSUER: orca.local
  AUTH_AUDIENCE: orca-clients
---
