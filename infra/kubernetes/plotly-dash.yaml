apiVersion: apps/v1
kind: Deployment
metadata:
  name: dash
  namespace: visualization
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dash
  template:
    metadata:
      labels:
        app: dash
    spec:
      containers:
        - name: dash
          image: atonixdev/orca-api-gateway:1.0.0
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "app.dash_app.server"]
          envFrom:
            - configMapRef:
                name: orca-platform-config
          env:
            - name: DASH_REFRESH_MS
              value: "5000"
          ports:
            - containerPort: 8050
          readinessProbe:
            httpGet:
              path: /
              port: 8050
          livenessProbe:
            httpGet:
              path: /
              port: 8050
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: dash
  namespace: visualization
spec:
  selector:
    app: dash
  ports:
    - port: 8050
      targetPort: 8050
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dash
  namespace: visualization
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dash
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70