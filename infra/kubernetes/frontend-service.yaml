apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-service
  namespace: visualization
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend-service
  template:
    metadata:
      labels:
        app: frontend-service
    spec:
      containers:
        - name: frontend-service
          image: smartcito/frontend-service:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: visualization
spec:
  selector:
    app: frontend-service
  ports:
    - port: 80
      targetPort: 80
