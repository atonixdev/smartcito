apiVersion: apps/v1
kind: Deployment
metadata:
  name: gps-service
  namespace: ingestion
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gps-service
  template:
    metadata:
      labels:
        app: gps-service
    spec:
      containers:
        - name: gps-service
          image: atonixdev/gps-service:1.0.0
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: orca-platform-config
            - secretRef:
                name: orca-platform-secrets
          ports:
            - containerPort: 8011
          readinessProbe:
            httpGet:
              path: /health
              port: 8011
          livenessProbe:
            httpGet:
              path: /health
              port: 8011
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: gps-service
  namespace: ingestion
spec:
  selector:
    app: gps-service
  ports:
    - port: 80
      targetPort: 8011
  type: ClusterIP
