  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-visualization
  namespace: visualization
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-visualization-gateway
  namespace: visualization
spec:
  podSelector:
    matchLabels:
      app: visualization-gateway
  ingress:
    - from:
        - ipBlock:
            cidr: 172.20.20.0/24
        - ipBlock:
            cidr: 172.20.30.0/24
      ports:
        - protocol: TCP
          port: 80
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: frontend-service
      ports:
        - protocol: TCP
          port: 80
    - to:
        - podSelector:
            matchLabels:
              app: dash
      ports:
        - protocol: TCP
          port: 8050
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - protocol: TCP
          port: 3000
        - protocol: TCP
          port: 5601
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: backend
      ports:
        - protocol: TCP
          port: 8000
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dash-runtime
  namespace: visualization
spec:
  podSelector:
    matchLabels:
      app: dash
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: visualization-gateway
      ports:
        - protocol: TCP
          port: 8050
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: visualization-gateway
      ports:
        - protocol: TCP
          port: 80
  policyTypes:
    - Ingress
    - Egress
---
