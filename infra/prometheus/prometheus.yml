global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: citosmart
    metrics_path: /metrics
    static_configs:
      - targets: ["citosmart:8000"]

  - job_name: dash
    metrics_path: /metrics
    static_configs:
      - targets: ["dash:8050"]

  - job_name: memcached
    static_configs:
      - targets: ["memcached-exporter:9150"]
