global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: citosmart
    metrics_path: /metrics
    static_configs:
      - targets: ["citosmart:8000"]

  - job_name: dash
    metrics_path: /metrics
    static_configs:
      - targets: ["dash:8050"]

  - job_name: memcached
    static_configs:
      - targets: ["memcached-exporter:9150"]

  - job_name: postgres-exporter
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: kafka-exporter
    static_configs:
      - targets: ["kafka-exporter:9308"]

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: fluent-bit
    static_configs:
      - targets: ["fluent-bit:2020"]
