groups:
  - name: orca-cache
    rules:
      - alert: MemcachedExporterDown
        expr: up{job="memcached"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Memcached exporter is down
          description: Memcached metrics have not been scraped successfully for more than 2 minutes.

      - alert: OrcaCacheLowHitRatio
        expr: |
          (
            sum(rate(orca_cache_hits_total[10m]))
            /
            clamp_min(sum(rate(orca_cache_hits_total[10m])) + sum(rate(orca_cache_misses_total[10m])), 1)
          ) < 0.60
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: Orca cache hit ratio is low
          description: Cache hit ratio has been below 60% for 15 minutes. Review cache coverage and TTL choices.

      - alert: OrcaCacheErrorsHigh
        expr: sum(rate(orca_cache_errors_total[5m])) > 0.05
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Orca cache errors are elevated
          description: Cache get/set/delete operations are failing more often than expected.