# ============================================================================
# File: infra/mosquitto/mosquitto.conf
# Purpose:
#   Minimal Mosquitto broker config for local Orca development.
#   Listens on 1883 and allows anonymous connections — DEV ONLY.
#
#   For production:
#     - Require username/password (password_file) or client certs.
#     - Bind to 8883 with TLS.
#     - Enable persistence and an ACL file scoped per device.
# ============================================================================

listener 1883 0.0.0.0
allow_anonymous true

# Persistence is off to keep the dev image stateless.
persistence false

log_type error
log_type warning
log_type notice
