<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-label="Storage and event backbone">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#eef3f8"/>
      <stop offset="100%" stop-color="#f7efe5"/>
    </linearGradient>
    <style>
      .title { font: 700 46px Georgia, serif; fill: #213844; }
      .label { font: 700 24px Georgia, serif; fill: #213844; }
      .body { font: 400 18px Georgia, serif; fill: #506673; }
      .card { fill: #ffffff; stroke: #213844; stroke-width: 3; rx: 26; }
      .line { stroke: #213844; stroke-width: 4; fill: none; }
    </style>
  </defs>
  <rect width="1400" height="820" fill="url(#bg)"/>
  <text x="80" y="90" class="title">Storage and Event Backbone</text>
  <text x="80" y="130" class="body">Kafka distributes events, PostgreSQL stores durable state, Redis serves hot reads, and block or object platforms back persistence tiers.</text>
  <rect x="110" y="320" width="230" height="130" class="card"/>
  <text x="175" y="390" class="label">Ingestion</text>
  <rect x="430" y="320" width="230" height="130" class="card"/>
  <text x="510" y="390" class="label">Kafka</text>
  <rect x="750" y="220" width="250" height="130" class="card"/>
  <text x="795" y="290" class="label">PostgreSQL</text>
  <rect x="750" y="420" width="250" height="130" class="card"/>
  <text x="830" y="490" class="label">Redis</text>
  <rect x="1090" y="240" width="230" height="120" class="card"/>
  <text x="1165" y="305" class="label">Swift</text>
  <rect x="1090" y="420" width="230" height="120" class="card"/>
  <text x="1160" y="485" class="label">Cinder</text>
  <path d="M340 385 L430 385" class="line"/>
  <path d="M660 385 L750 285" class="line"/>
  <path d="M660 385 L750 485" class="line"/>
  <path d="M1000 285 L1090 300" class="line"/>
  <path d="M1000 485 L1090 480" class="line"/>
</svg>