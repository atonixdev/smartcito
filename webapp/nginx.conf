# ============================================================================
# File: webapp/nginx.conf
# Purpose:
#   Serve the React SPA and proxy /api requests to the orcaapi container.
#   The `try_files ... /index.html` line is what makes client-side routing
#   work on hard refresh.
# ============================================================================

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    resolver 127.0.0.11 ipv6=off;

    location /api/ {
        set $api_router http://api-router:8000;
        proxy_pass $api_router/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /drone-gateway/ {
        set $drone_gateway http://drone-gateway:8020;
        rewrite ^/drone-gateway/(.*)$ /$1 break;
        proxy_pass $drone_gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /mission-control/ {
        set $mission_control http://mission-control:8025;
        rewrite ^/mission-control/(.*)$ /$1 break;
        proxy_pass $mission_control;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /mapping-geospatial/ {
        set $mapping_geospatial http://mapping-geospatial:8024;
        rewrite ^/mapping-geospatial/(.*)$ /$1 break;
        proxy_pass $mapping_geospatial;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /drone-camera/ {
        set $drone_camera http://drone-camera-ingestion:8022;
        rewrite ^/drone-camera/(.*)$ /$1 break;
        proxy_pass $drone_camera;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /threat-detection/ {
        set $threat_detection http://threat-detection:8023;
        rewrite ^/threat-detection/(.*)$ /$1 break;
        proxy_pass $threat_detection;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /dash/ {
        set $dash http://dash:8050;
        rewrite ^/dash/(.*)$ /$1 break;
        proxy_pass $dash;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Prefix /dash;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /grafana/ {
        set $grafana http://grafana:3000;
        rewrite ^/grafana/(.*)$ /$1 break;
        proxy_pass $grafana;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Prefix /grafana;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /kibana/ {
        set $kibana http://kibana:5601;
        rewrite ^/kibana/(.*)$ /$1 break;
        proxy_pass $kibana;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Prefix /kibana;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
