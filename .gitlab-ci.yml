stages:
  - build
  - test
  - secret-detection
  - package
  - deploy-staging
  - deploy-production

include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml

sast:
  stage: test

variables:
  DOCKER_TLS_CERTDIR: "/certs"
  IMAGE_TAG: "$CI_COMMIT_SHA"
  SECRET_DETECTION_ENABLED: 'true'

secret_detection:
  stage: secret-detection

build:docker-images:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  rules:
    - if: '$CI_REGISTRY_IMAGE'
    - when: never
  script:
    - docker build --pull -t "$CI_REGISTRY_IMAGE/orcaapi:$IMAGE_TAG" ./orcaapi
    - docker build --pull -t "$CI_REGISTRY_IMAGE/webapp:$IMAGE_TAG" ./webapp
    - docker build --pull -f camera_module/Dockerfile -t "$CI_REGISTRY_IMAGE/camera-service:$IMAGE_TAG" .
    - docker build --pull -f gps_module/Dockerfile -t "$CI_REGISTRY_IMAGE/gps-service:$IMAGE_TAG" .
    - docker build --pull -f ai/ai_models/Dockerfile -t "$CI_REGISTRY_IMAGE/ai-service:$IMAGE_TAG" .
    - docker build --pull -f security/Dockerfile -t "$CI_REGISTRY_IMAGE/security-service:$IMAGE_TAG" .
    - docker build --pull -f hardware/Dockerfile -t "$CI_REGISTRY_IMAGE/hardware-agent:$IMAGE_TAG" .
    - docker build --pull -f hardware/usb_module/Dockerfile -t "$CI_REGISTRY_IMAGE/usb-module:$IMAGE_TAG" .
    - docker build --pull -f ingestion/Dockerfile -t "$CI_REGISTRY_IMAGE/ingestion-kafka-producer:$IMAGE_TAG" .
    - docker build --pull -f ingestion/Dockerfile.spark -t "$CI_REGISTRY_IMAGE/ingestion-spark:$IMAGE_TAG" .

test:orcaapi:
  stage: test
  image: python:3.11-slim
  services:
    - name: memcached:1.6-alpine
      alias: memcached
  before_script:
    - pip install -r orcaapi/requirements-dev.txt black flake8 mypy
  script:
    - cd orcaapi
    - black --check .
    - flake8 .
    - mypy app
    - MEMCACHED_SERVERS=memcached:11211 pytest

test:python-services:
  stage: test
  image: python:3.11-slim
  services:
    - name: memcached:1.6-alpine
      alias: memcached
  before_script:
    - pip install black flake8 mypy pytest httpx
    - pip install -r orcaapi/requirements.txt
    - pip install -r ai/ai_models/requirements.txt
    - pip install -r camera_module/requirements.txt
    - pip install -r gps_module/requirements.txt
    - pip install -r ingestion/requirements.txt
    - pip install -r security/requirements.txt
    - pip install -r hardware/requirements.txt
  script:
    - black --check ai/ai_models camera_module gps_module ingestion security/service.py hardware/service.py ai/ai_models/tests camera_module/tests gps_module/tests ingestion/tests security/tests hardware/tests
    - flake8 ai/ai_models camera_module gps_module ingestion security/service.py hardware/service.py ai/ai_models/tests camera_module/tests gps_module/tests ingestion/tests security/tests hardware/tests
    - mypy --ignore-missing-imports ai/ai_models camera_module gps_module ingestion security/service.py hardware/service.py ai/ai_models/tests camera_module/tests gps_module/tests ingestion/tests security/tests hardware/tests
    - PYTHONPATH="$CI_PROJECT_DIR:$CI_PROJECT_DIR/orcaapi" MEMCACHED_SERVERS=memcached:11211 pytest ai/ai_models/tests camera_module/tests gps_module/tests ingestion/tests security/tests hardware/tests

test:memcached-smoke:
  stage: test
  image: python:3.11-slim
  services:
    - name: memcached:1.6-alpine
      alias: memcached
  before_script:
    - pip install pymemcache==4.0.0
  script:
    - MEMCACHED_SERVERS=memcached:11211 python scripts/ci/memcached_smoke.py

test:ai-offline-smoke:
  stage: test
  image: python:3.11-slim
  script:
    - python scripts/ci/ai_offline_validation.py

test:security-root:
  stage: test
  image: python:3.11-slim
  before_script:
    - pip install pytest pyyaml
  script:
    - PYTHONPATH="$CI_PROJECT_DIR" pytest tests/security -v

test:webapp:
  stage: test
  image: node:20-bookworm
  script:
    - cd webapp
    - npm ci
    - npm run lint
    - npm run format:check
    - npm run test
    - npm run build

test:map:
  stage: test
  image: node:20-bookworm
  script:
    - cd map
    - npm install --no-audit --no-fund
    - npm run lint
    - npm run format:check
    - npm test

package:push-images:
  stage: package
  image: docker:27
  services:
    - docker:27-dind
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_REGISTRY && $CI_REGISTRY_IMAGE && $CI_REGISTRY_USER && $CI_REGISTRY_PASSWORD'
    - if: '$CI_COMMIT_TAG && $CI_REGISTRY && $CI_REGISTRY_IMAGE && $CI_REGISTRY_USER && $CI_REGISTRY_PASSWORD'
    - when: never
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin
    - docker build --pull -t "$CI_REGISTRY_IMAGE/orcaapi:$IMAGE_TAG" -t "$CI_REGISTRY_IMAGE/orcaapi:latest" ./orcaapi
    - docker build --pull -t "$CI_REGISTRY_IMAGE/webapp:$IMAGE_TAG" -t "$CI_REGISTRY_IMAGE/webapp:latest" ./webapp
    - docker build --pull -f camera_module/Dockerfile -t "$CI_REGISTRY_IMAGE/camera-service:$IMAGE_TAG" -t "$CI_REGISTRY_IMAGE/camera-service:latest" .
    - docker build --pull -f gps_module/Dockerfile -t "$CI_REGISTRY_IMAGE/gps-service:$IMAGE_TAG" -t "$CI_REGISTRY_IMAGE/gps-service:latest" .
    - docker build --pull -f ai/ai_models/Dockerfile -t "$CI_REGISTRY_IMAGE/ai-service:$IMAGE_TAG" -t "$CI_REGISTRY_IMAGE/ai-service:latest" .
    - docker build --pull -f security/Dockerfile -t "$CI_REGISTRY_IMAGE/security-service:$IMAGE_TAG" -t "$CI_REGISTRY_IMAGE/security-service:latest" .
    - docker build --pull -f hardware/Dockerfile -t "$CI_REGISTRY_IMAGE/hardware-agent:$IMAGE_TAG" -t "$CI_REGISTRY_IMAGE/hardware-agent:latest" .
    - docker build --pull -f hardware/usb_module/Dockerfile -t "$CI_REGISTRY_IMAGE/usb-module:$IMAGE_TAG" -t "$CI_REGISTRY_IMAGE/usb-module:latest" .
    - docker build --pull -f ingestion/Dockerfile -t "$CI_REGISTRY_IMAGE/ingestion-kafka-producer:$IMAGE_TAG" -t "$CI_REGISTRY_IMAGE/ingestion-kafka-producer:latest" .
    - docker build --pull -f ingestion/Dockerfile.spark -t "$CI_REGISTRY_IMAGE/ingestion-spark:$IMAGE_TAG" -t "$CI_REGISTRY_IMAGE/ingestion-spark:latest" .
    - docker push "$CI_REGISTRY_IMAGE/orcaapi:$IMAGE_TAG"
    - docker push "$CI_REGISTRY_IMAGE/orcaapi:latest"
    - docker push "$CI_REGISTRY_IMAGE/webapp:$IMAGE_TAG"
    - docker push "$CI_REGISTRY_IMAGE/webapp:latest"
    - docker push "$CI_REGISTRY_IMAGE/camera-service:$IMAGE_TAG"
    - docker push "$CI_REGISTRY_IMAGE/camera-service:latest"
    - docker push "$CI_REGISTRY_IMAGE/gps-service:$IMAGE_TAG"
    - docker push "$CI_REGISTRY_IMAGE/gps-service:latest"
    - docker push "$CI_REGISTRY_IMAGE/ai-service:$IMAGE_TAG"
    - docker push "$CI_REGISTRY_IMAGE/ai-service:latest"
    - docker push "$CI_REGISTRY_IMAGE/security-service:$IMAGE_TAG"
    - docker push "$CI_REGISTRY_IMAGE/security-service:latest"
    - docker push "$CI_REGISTRY_IMAGE/hardware-agent:$IMAGE_TAG"
    - docker push "$CI_REGISTRY_IMAGE/hardware-agent:latest"
    - docker push "$CI_REGISTRY_IMAGE/usb-module:$IMAGE_TAG"
    - docker push "$CI_REGISTRY_IMAGE/usb-module:latest"
    - docker push "$CI_REGISTRY_IMAGE/ingestion-kafka-producer:$IMAGE_TAG"
    - docker push "$CI_REGISTRY_IMAGE/ingestion-kafka-producer:latest"
    - docker push "$CI_REGISTRY_IMAGE/ingestion-spark:$IMAGE_TAG"
    - docker push "$CI_REGISTRY_IMAGE/ingestion-spark:latest"

deploy:staging:
  stage: deploy-staging
  image: debian:bookworm
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $DEPLOY_SSH_KEY && $DEPLOY_HOST && $DEPLOY_USER && $DEPLOY_PATH'
    - when: never
  before_script:
    - apt-get update && apt-get install -y openssh-client bash
    - mkdir -p ~/.ssh
    - printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
  script:
    - IMAGE_REGISTRY="$CI_REGISTRY_IMAGE" IMAGE_TAG="$CI_COMMIT_SHA" APP_ENV=staging DEPLOY_ENVIRONMENT=staging bash infra/deploy/deploy_remote.sh staging

deploy:production:
  stage: deploy-production
  image: debian:bookworm
  rules:
    - if: '$CI_COMMIT_TAG && $DEPLOY_SSH_KEY && $DEPLOY_HOST && $DEPLOY_USER && $DEPLOY_PATH'
    - when: never
  before_script:
    - apt-get update && apt-get install -y openssh-client bash
    - mkdir -p ~/.ssh
    - printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
  script:
    - IMAGE_REGISTRY="$CI_REGISTRY_IMAGE" IMAGE_TAG="$CI_COMMIT_SHA" APP_ENV=production DEPLOY_ENVIRONMENT=production bash infra/deploy/deploy_remote.sh production
