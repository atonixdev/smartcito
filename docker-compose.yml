# ============================================================================
# File: docker-compose.yml
# Purpose:
#   One-command local stack for SmartCito. Brings up the API, the React
#   dashboard, PostgreSQL, Redis, and a single-node Kafka (KRaft mode).
#
# Usage:
#   cp .env.example .env
#   docker compose up --build
# ============================================================================

services:
  citosmart:
    build:
      context: ./citosmart
    container_name: smartcito-citosmart
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_started
    restart: unless-stopped

  webapp:
    build:
      context: ./webapp
    container_name: smartcito-webapp
    ports:
      - "5173:80"
    depends_on:
      - citosmart
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: smartcito-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smartcito}
      POSTGRES_USER: ${POSTGRES_USER:-smartcito}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartcito}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smartcito}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: smartcito-redis
    ports:
      - "6379:6379"

  kafka:
    # Single-node KRaft (no ZooKeeper) — fine for local dev only.
    image: bitnami/kafka:3.7
    container_name: smartcito-kafka
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: "broker,controller"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports:
      - "9092:9092"

  mqtt:
    # Eclipse Mosquitto broker. Listener config is bind-mounted so it can
    # be customized without rebuilding the image.
    image: eclipse-mosquitto:2.0
    container_name: smartcito-mqtt
    ports:
      - "1883:1883"
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    restart: unless-stopped

  dash:
    # Plotly Dash analytics side-app. Shares the citosmart image; only the
    # command differs.
    build:
      context: ./citosmart
    container_name: smartcito-dash
    command: ["python", "-m", "app.dash_app.server"]
    environment:
      SMARTCITO_API_BASE: "http://citosmart:8000/api/v1"
    ports:
      - "8050:8050"
    depends_on:
      - citosmart
    restart: unless-stopped

volumes:
  pgdata:
