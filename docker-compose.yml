# ============================================================================
# File: docker-compose.yml
# Purpose:
#   One-command local stack for SmartCito. Brings up the API, the React
#   dashboard, PostgreSQL, Redis, and a single-node Kafka (KRaft mode).
#
# Usage:
#   cp .env.example .env
#   docker compose up --build
# ============================================================================

services:
  memcached-1:
    image: memcached:1.6-alpine
    container_name: smartcito-memcached-1-local
    command: ["memcached", "-m", "128", "-I", "2m", "-o", "modern"]
    restart: unless-stopped

  memcached-2:
    image: memcached:1.6-alpine
    container_name: smartcito-memcached-2-local
    command: ["memcached", "-m", "128", "-I", "2m", "-o", "modern"]
    restart: unless-stopped

  memcached-3:
    image: memcached:1.6-alpine
    container_name: smartcito-memcached-3-local
    command: ["memcached", "-m", "128", "-I", "2m", "-o", "modern"]
    restart: unless-stopped

  api-router:
    image: nginx:1.27-alpine
    container_name: smartcito-api-router
    ports:
      - "8000:8000"
    volumes:
      - ./infra/deploy/nginx/api-router.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/deploy/nginx/upstreams/api-local.conf:/etc/nginx/api-upstream.conf:ro
    depends_on:
      - citosmart
    restart: unless-stopped

  citosmart:
    image: atonixdev/api-gateway:1.0.0
    container_name: smartcito-citosmart
    env_file: .env
    environment:
      PYTHONPATH: /app
    volumes:
      - ./data:/app/data
      - ./ingestion/config:/ingestion/config:ro
      - ./smartcito_shared:/app/smartcito_shared:ro
      - ./hardware:/app/hardware:ro
    depends_on:
      postgres:
        condition: service_healthy
      memcached-1:
        condition: service_started
      memcached-2:
        condition: service_started
      memcached-3:
        condition: service_started
      redis:
        condition: service_started
      kafka:
        condition: service_started
    restart: unless-stopped

  webapp:
    image: atonixdev/webapp:1.0.0
    container_name: smartcito-webapp
    env_file: .env
    ports:
      - "5173:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      - api-router
      - drone-gateway
      - mission-control
      - mapping-geospatial
      - drone-camera-ingestion
      - threat-detection
    restart: unless-stopped

  drone-gateway:
    image: atonixdev/drone-gateway:1.0.0
    container_name: smartcito-drone-gateway
    env_file: .env
    environment:
      PYTHONPATH: /app
    command: ["uvicorn", "surveillance.drone_gateway_service:app", "--host", "0.0.0.0", "--port", "8020"]
    volumes:
      - ./smartcito_shared:/app/smartcito_shared:ro
    ports:
      - "8020:8020"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    restart: unless-stopped

  sensor-gateway:
    image: atonixdev/sensor-gateway:1.0.0
    container_name: smartcito-sensor-gateway
    env_file: .env
    environment:
      PYTHONPATH: /app
    command: ["uvicorn", "surveillance.sensor_gateway_service:app", "--host", "0.0.0.0", "--port", "8021"]
    volumes:
      - ./smartcito_shared:/app/smartcito_shared:ro
    ports:
      - "8021:8021"
    depends_on:
      kafka:
        condition: service_started
    restart: unless-stopped

  drone-camera-ingestion:
    image: atonixdev/drone-camera-ingestion:1.0.0
    container_name: smartcito-drone-camera-ingestion
    env_file: .env
    environment:
      PYTHONPATH: /app
    command: ["uvicorn", "surveillance.drone_camera_service:app", "--host", "0.0.0.0", "--port", "8022"]
    volumes:
      - ./smartcito_shared:/app/smartcito_shared:ro
    ports:
      - "8022:8022"
    depends_on:
      kafka:
        condition: service_started
    restart: unless-stopped

  threat-detection:
    image: atonixdev/threat-detection:1.0.0
    container_name: smartcito-threat-detection
    env_file: .env
    environment:
      PYTHONPATH: /app
    command: ["uvicorn", "surveillance.threat_detection_service:app", "--host", "0.0.0.0", "--port", "8023"]
    volumes:
      - ./smartcito_shared:/app/smartcito_shared:ro
    ports:
      - "8023:8023"
    depends_on:
      kafka:
        condition: service_started
    restart: unless-stopped

  mapping-geospatial:
    image: atonixdev/mapping-geospatial:1.0.0
    container_name: smartcito-mapping-geospatial
    env_file: .env
    environment:
      PYTHONPATH: /app
    command: ["uvicorn", "surveillance.mapping_service:app", "--host", "0.0.0.0", "--port", "8024"]
    volumes:
      - ./smartcito_shared:/app/smartcito_shared:ro
    ports:
      - "8024:8024"
    depends_on:
      kafka:
        condition: service_started
    restart: unless-stopped

  mission-control:
    image: atonixdev/mission-control:1.0.0
    container_name: smartcito-mission-control
    env_file: .env
    environment:
      PYTHONPATH: /app
      DRONE_GATEWAY_URL: http://drone-gateway:8020
    command: ["uvicorn", "surveillance.mission_control_service:app", "--host", "0.0.0.0", "--port", "8025"]
    volumes:
      - ./smartcito_shared:/app/smartcito_shared:ro
    ports:
      - "8025:8025"
    depends_on:
      drone-gateway:
        condition: service_started
      kafka:
        condition: service_started
    restart: unless-stopped

  camera-service:
    image: atonixdev/camera-service:1.0.0
    container_name: smartcito-camera-service
    env_file: .env
    ports:
      - "8010:8010"
    restart: unless-stopped

  gps-service:
    image: atonixdev/gps-service:1.0.0
    container_name: smartcito-gps-service
    env_file: .env
    ports:
      - "8011:8011"
    restart: unless-stopped

  ai-service:
    image: atonixdev/ai-service:1.0.0
    container_name: smartcito-ai-service
    env_file: .env
    ports:
      - "8012:8012"
    restart: unless-stopped

  security-service:
    image: atonixdev/security-service:1.0.0
    container_name: smartcito-security-service
    env_file: .env
    ports:
      - "8013:8013"
    depends_on:
      - api-router
    restart: unless-stopped

  hardware-agent:
    image: atonixdev/hardware-agent:1.0.0
    container_name: smartcito-hardware-agent
    env_file: .env
    ports:
      - "8014:8014"
    restart: unless-stopped

  postgres:
    image: cgr.dev/chainguard/postgres:latest@sha256:34a4d686aa44583457bbdbdeb662243e7ab29e89e5c9b40df8e33baa6b75dc47
    container_name: smartcito-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-smartcito}
      POSTGRES_USER: ${DB_USER:-smartcito}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-smartcito}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - ./database/init/001_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-smartcito}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: smartcito-redis
    ports:
      - "6379:6379"

  kafka:
    # Single-node KRaft (no ZooKeeper) — fine for local dev only.
    image: apache/kafka:3.9.0
    container_name: smartcito-kafka
    environment:
      CLUSTER_ID: "5L6g3nShT-eMCtK--X86sw"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    ports:
      - "9092:9092"

  mqtt:
    # Eclipse Mosquitto broker. Listener config is bind-mounted so it can
    # be customized without rebuilding the image.
    image: eclipse-mosquitto:2.0
    container_name: smartcito-mqtt
    ports:
      - "1883:1883"
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
    restart: unless-stopped

  dash:
    # Plotly Dash analytics side-app. Shares the citosmart image; only the
    # command differs.
    image: atonixdev/dash:1.0.0
    container_name: smartcito-dash
    command: ["python", "-m", "app.dash_app.server"]
    environment:
      SMARTCITO_API_BASE: "http://api-router:8000/api/v1"
      PYTHONPATH: /app
    volumes:
      - ./smartcito_shared:/app/smartcito_shared:ro
      - ./hardware:/app/hardware:ro
    ports:
      - "8050:8050"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8050/metrics').status == 200 else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      - api-router
    restart: unless-stopped

  memcached-exporter:
    image: prom/memcached-exporter:v0.15.0
    container_name: smartcito-memcached-exporter
    command: ["--memcached.address=memcached-1:11211"]
    depends_on:
      - memcached-1
    restart: unless-stopped

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    container_name: smartcito-postgres-exporter
    environment:
      DATA_SOURCE_URI: postgres:5432/${DB_NAME:-smartcito}?sslmode=disable
      DATA_SOURCE_USER: ${DB_USER:-smartcito}
      DATA_SOURCE_PASS: ${DB_PASSWORD:-smartcito}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.7.0
    container_name: smartcito-kafka-exporter
    command: ["--kafka.server=kafka:9092"]
    depends_on:
      - kafka
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: smartcito-node-exporter
    command: ["--path.rootfs=/host"]
    volumes:
      - /:/host:ro
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: smartcito-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheusdata:/prometheus
    depends_on:
      - citosmart
      - drone-gateway
      - sensor-gateway
      - drone-camera-ingestion
      - threat-detection
      - mapping-geospatial
      - mission-control
      - dash
      - memcached-exporter
      - postgres-exporter
      - kafka-exporter
      - node-exporter
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    container_name: smartcito-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change-me}
      GF_SERVER_ROOT_URL: '%(protocol)s://%(domain)s/grafana/'
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./infra/observability/grafana/datasources/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - ./infra/observability/grafana/dashboards/dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml:ro
      - ./infra/observability/grafana/dashboards/smartcito-overview.json:/var/lib/grafana/dashboards/smartcito-overview.json:ro
      - grafanadata:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.2
    container_name: smartcito-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms1g -Xmx1g
    volumes:
      - elasticsearchdata:/usr/share/elasticsearch/data
    restart: unless-stopped

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.2
    container_name: smartcito-kibana
    volumes:
      - ./infra/observability/kibana/kibana.yml:/usr/share/kibana/config/kibana.yml:ro
    depends_on:
      - elasticsearch
    restart: unless-stopped

  fluent-bit:
    image: fluent/fluent-bit:3.1.9
    container_name: smartcito-fluent-bit
    volumes:
      - ./infra/observability/fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./infra/observability/fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      - elasticsearch
    restart: unless-stopped

  visualization-gateway:
    image: nginx:1.27-alpine
    container_name: smartcito-visualization-gateway
    ports:
      - "8088:80"
    volumes:
      - ./infra/deploy/nginx/visualization-gateway.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - webapp
      - api-router
      - drone-gateway
      - mission-control
      - mapping-geospatial
      - drone-camera-ingestion
      - threat-detection
      - dash
      - grafana
      - kibana
    restart: unless-stopped

volumes:
  pgdata:
  prometheusdata:
  grafanadata:
  elasticsearchdata:
