# ============================================================================
# File: docker-compose.yml
# Purpose:
#   One-command local stack for SmartCito. Brings up the API, the React
#   dashboard, PostgreSQL, Redis, and a single-node Kafka (KRaft mode).
#
# Usage:
#   cp .env.example .env
#   docker compose up --build
# ============================================================================

services:
  memcached-1:
    image: memcached:1.6-alpine
    container_name: smartcito-memcached-1-local
    command: ["memcached", "-m", "128", "-I", "2m", "-o", "modern"]
    restart: unless-stopped

  memcached-2:
    image: memcached:1.6-alpine
    container_name: smartcito-memcached-2-local
    command: ["memcached", "-m", "128", "-I", "2m", "-o", "modern"]
    restart: unless-stopped

  memcached-3:
    image: memcached:1.6-alpine
    container_name: smartcito-memcached-3-local
    command: ["memcached", "-m", "128", "-I", "2m", "-o", "modern"]
    restart: unless-stopped

  api-router:
    image: nginx:1.27-alpine
    container_name: smartcito-api-router
    ports:
      - "8000:8000"
    volumes:
      - ./infra/deploy/nginx/api-router.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/deploy/nginx/upstreams/api-local.conf:/etc/nginx/conf.d/api-upstream.conf:ro
    depends_on:
      - citosmart
    restart: unless-stopped

  citosmart:
    build:
      context: ./citosmart
    image: smartcito/api-gateway:local
    container_name: smartcito-citosmart
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      memcached-1:
        condition: service_started
      memcached-2:
        condition: service_started
      memcached-3:
        condition: service_started
      redis:
        condition: service_started
      kafka:
        condition: service_started
    restart: unless-stopped

  webapp:
    build:
      context: ./webapp
    image: smartcito/frontend-service:local
    container_name: smartcito-webapp
    env_file: .env
    ports:
      - "5173:80"
    depends_on:
      - api-router
    restart: unless-stopped

  camera-service:
    build:
      context: .
      dockerfile: camera_module/Dockerfile
    image: smartcito/camera-service:local
    container_name: smartcito-camera-service
    env_file: .env
    ports:
      - "8010:8010"
    restart: unless-stopped

  gps-service:
    build:
      context: .
      dockerfile: gps_module/Dockerfile
    image: smartcito/gps-service:local
    container_name: smartcito-gps-service
    env_file: .env
    ports:
      - "8011:8011"
    restart: unless-stopped

  ai-service:
    build:
      context: .
      dockerfile: ai_models/Dockerfile
    image: smartcito/ai-service:local
    container_name: smartcito-ai-service
    env_file: .env
    ports:
      - "8012:8012"
    restart: unless-stopped

  security-service:
    build:
      context: .
      dockerfile: security/Dockerfile
    image: smartcito/security-service:local
    container_name: smartcito-security-service
    env_file: .env
    ports:
      - "8013:8013"
    depends_on:
      - api-router
    restart: unless-stopped

  hardware-agent:
    build:
      context: .
      dockerfile: hardware/Dockerfile
    image: smartcito/hardware-agent:local
    container_name: smartcito-hardware-agent
    env_file: .env
    ports:
      - "8014:8014"
    restart: unless-stopped

  postgres:
    image: cgr.dev/chainguard/postgres:latest@sha256:34a4d686aa44583457bbdbdeb662243e7ab29e89e5c9b40df8e33baa6b75dc47
    container_name: smartcito-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-smartcito}
      POSTGRES_USER: ${DB_USER:-smartcito}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-smartcito}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - ./database/init/001_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-smartcito}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: smartcito-redis
    ports:
      - "6379:6379"

  kafka:
    # Single-node KRaft (no ZooKeeper) — fine for local dev only.
    image: bitnami/kafka:3.7
    container_name: smartcito-kafka
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: "broker,controller"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports:
      - "9092:9092"

  mqtt:
    # Eclipse Mosquitto broker. Listener config is bind-mounted so it can
    # be customized without rebuilding the image.
    image: eclipse-mosquitto:2.0
    container_name: smartcito-mqtt
    ports:
      - "1883:1883"
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    restart: unless-stopped

  dash:
    # Plotly Dash analytics side-app. Shares the citosmart image; only the
    # command differs.
    build:
      context: ./citosmart
    image: smartcito/dash:local
    container_name: smartcito-dash
    command: ["python", "-m", "app.dash_app.server"]
    environment:
      SMARTCITO_API_BASE: "http://api-router:8000/api/v1"
    ports:
      - "8050:8050"
    depends_on:
      - api-router
    restart: unless-stopped

volumes:
  pgdata:
